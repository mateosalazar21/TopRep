<ion-content fullscreen="true" class="center-content">
  <ion-grid fixed>
    <ion-row class="ion-justify-content-center ion-align-items-center" style="height: 100%;">
      
      <ion-col size="12" size-md="6" class="ion-text-center">
        <form [formGroup]="credentials" (ngSubmit)="login()">

          <ion-item fill="solid" class="ion-margin-bottom">
            <ion-input type="email" placeholder="Email" formControlName="email"></ion-input>
            <ion-note slot="error" *ngIf="(email?.dirty || email?.touched) && email?.errors">
              Email is incorrect
            </ion-note>
          </ion-item>

          <ion-item fill="solid" class="ion-margin-bottom">
            <ion-input type="password" placeholder="Password" formControlName="password"></ion-input>
            <ion-note slot="error" *ngIf="(password?.dirty || password?.touched) && password?.errors">
              Password is incorrect
            </ion-note>
          </ion-item>

          <ion-button expand="full" type="submit" [disabled]="!credentials.valid">Login</ion-button>
          <ion-button expand="full" type="button" (click)="register()">Create account</ion-button>
        </form>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
